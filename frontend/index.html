<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteFlow - Note Management App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm" id="mainNavbar" style="display: none;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">
                <i class="bi bi-journal-text"></i> NoteFlow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="d-flex mx-auto" style="width: 40%;">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-start-0 bg-light" id="searchInput" placeholder="Search notes...">
                    </div>
                </div>
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" id="themeToggle"><i class="bi bi-moon"></i> Toggle Theme</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container (SPA views will be injected or toggled here) -->
    <div id="appContainer" class="container-fluid mt-4">
        <!-- Auth Views (Login/Register/Reset) will be shown here. -->
        <div id="authView" class="row justify-content-center mt-5">
            <div class="col-md-5 col-lg-4">
                
                <!-- Login Form -->
                <div id="loginSection" class="card shadow border-0 rounded-4 p-4">
                    <h3 class="fw-bold mb-3 text-center">Welcome Back</h3>
                    <div id="loginAlert" class="alert d-none"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="loginEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg rounded-3 mt-2">Sign In</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#" class="text-decoration-none" id="showRegisterBtn">Create Account</a> | 
                        <a href="#" class="text-decoration-none" id="showResetBtn">Forgot Password?</a>
                    </div>
                </div>

                <!-- Registration Form -->
                <div id="registerSection" class="card shadow border-0 rounded-4 p-4 d-none">
                    <h3 class="fw-bold mb-3 text-center">Create Account</h3>
                    <div id="registerAlert" class="alert d-none"></div>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control form-control-lg" id="registerName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="registerPassword" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 btn-lg rounded-3 mt-2">Register</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#" class="text-decoration-none" id="showLoginFromRegisterBtn">Back to Login</a>
                    </div>
                </div>

                <!-- Reset Password Form -->
                <div id="resetSection" class="card shadow border-0 rounded-4 p-4 d-none">
                    <h3 class="fw-bold mb-3 text-center">Reset Password</h3>
                    <div id="resetAlert" class="alert d-none"></div>
                    
                    <form id="resetRequestForm">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="resetEmail" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg rounded-3 mt-2 text-white">Send OTP</button>
                    </form>

                    <form id="resetConfirmForm" class="d-none mt-3">
                        <div class="mb-3">
                            <label class="form-label">OTP</label>
                            <input type="text" class="form-control form-control-lg" id="resetOTP" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control form-control-lg" id="resetNewPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg rounded-3 mt-2">Confirm Reset</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="#" class="text-decoration-none" id="showLoginFromResetBtn">Back to Login</a>
                    </div>
                </div>

            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView" style="display: none;" class="h-100 placeholder-glow">
            <div class="row gx-4 h-100">
                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2 d-none d-md-block border-end py-3">
                    <button class="btn btn-primary w-100 rounded-pill shadow-sm mb-4" id="createNoteBtn">
                        <i class="bi bi-plus-lg"></i> Create Note
                    </button>
                    <ul class="nav flex-column nav-pills gap-1">
                        <li class="nav-item"><a href="#" class="nav-link active" id="navAllNotes"><i class="bi bi-journal-text me-2"></i> All Notes</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" id="navPins"><i class="bi bi-pin-angle me-2"></i> Pinned</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" id="navShared"><i class="bi bi-people me-2"></i> Shared with me</a></li>
                    </ul>
                    
                    <h6 class="text-uppercase text-muted fw-bold mt-4 mb-2 ps-2 fs-7 d-flex justify-content-between align-items-center">
                        Labels
                        <button class="btn btn-sm btn-link text-decoration-none p-0" id="addLabelBtn"><i class="bi bi-plus-lg"></i></button>
                    </h6>
                    <ul class="nav flex-column nav-pills gap-1" id="labelsList">
                        <!-- Dynamic Labels here -->
                    </ul>
                </div>

                <!-- Main Note Area -->
                <div class="col-12 col-md-9 col-lg-10 py-3 position-relative">
                    
                    <!-- Search Results Info -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0 fw-bold" id="dashboardTitle">All Notes</h4>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-outline-secondary active" id="viewGridBtn"><i class="bi bi-grid"></i></button>
                            <button type="button" class="btn btn-outline-secondary" id="viewListBtn"><i class="bi bi-list-ul"></i></button>
                        </div>
                    </div>

                    <!-- Notes Container -->
                    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4" id="notesContainer">
                        <!-- Dynamic Notes here -->
                        <div class="col-12 text-center text-muted mt-5" id="emptyNotesMsg">
                            <i class="bi bi-journal-x fs-1 opacity-25"></i>
                            <p class="mt-2">No notes found.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Note Editor Modal -->
        <div class="modal fade" id="noteEditorModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0 flex-nowrap align-items-start">
                        <input type="text" id="editorTitle" class="form-control border-0 fw-bold fs-4 bg-transparent shadow-none w-100 me-3" placeholder="Title">
                        <small class="text-muted text-nowrap ms-auto align-self-center me-2" id="saveStatus">Saved</small>
                        <button type="button" class="btn-close mt-2" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body pt-2 position-relative">
                        <textarea id="editorContent" class="form-control border-0 bg-transparent shadow-none" rows="12" placeholder="Take a note..."></textarea>
                        
                        <!-- Attachments preview area -->
                        <div id="editorAttachments" class="d-flex flex-wrap gap-2 mt-3"></div>
                    </div>
                    <div class="modal-footer border-top-0 d-flex justify-content-between">
                        <div id="editorActions">
                            <button class="btn btn-light rounded-circle p-2" title="Pin Note" id="editorPinBtn"><i class="bi bi-pin"></i></button>
                            <button class="btn btn-light rounded-circle p-2" title="Add Label" id="editorTagBtn"><i class="bi bi-tag"></i></button>
                            
                            <!-- Hidden File Input for images -->
                            <input type="file" id="editorImgInput" class="d-none" accept="image/png, image/jpeg, image/gif, image/webp">
                            <button class="btn btn-light rounded-circle p-2" title="Add Image" id="editorImgBtn" onclick="document.getElementById('editorImgInput').click()"><i class="bi bi-image"></i></button>
                            
                            <button class="btn btn-light rounded-circle p-2" title="Lock Note" id="editorLockBtn"><i class="bi bi-lock"></i></button>
                            <button class="btn btn-light rounded-circle p-2" title="Share Note" id="editorShareBtn"><i class="bi bi-person-plus"></i></button>
                            
                            <button class="btn btn-light rounded-circle p-2 text-danger" title="Delete Note" id="editorDeleteBtn"><i class="bi bi-trash"></i></button>
                        </div>
                        <button type="button" class="btn btn-primary px-4 fw-medium" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Unlock Note Modal -->
        <div class="modal fade" id="unlockModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold">Note is Locked</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="password" id="unlockPassword" class="form-control" placeholder="Enter password...">
                        <div id="unlockAlert" class="text-danger small mt-2 d-none"></div>
                    </div>
                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn btn-primary w-100" id="unlockSubmitBtn">Unlock</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Share Note Modal -->
        <div class="modal fade" id="shareModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="fw-bold">Share Note</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="input-group mb-3">
                            <input type="email" id="shareEmail" class="form-control" placeholder="Collaborator Email">
                            <select class="form-select" id="shareAccess" style="max-width: 120px;">
                                <option value="read">Read</option>
                                <option value="edit">Edit</option>
                            </select>
                            <button class="btn btn-primary" id="shareSubmitBtn">Share</button>
                        </div>
                        <div id="shareAlert" class="text-success small mt-2 d-none"></div>
                        <hr>
                        <h6 class="fw-bold">Shared With</h6>
                        <ul class="list-group list-group-flush" id="sharedList">
                            <!-- Dynamic Shares here -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main JS Application -->
    <script src="js/app.js"></script>
</body>
</html>
